[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "md2pdf-bookmarks"
version = "0.1.0"
description = "Convert Markdown to PDF with auto-generated bookmarks and CJK support"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
keywords = ["markdown", "pdf", "converter", "bookmarks", "cjk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Markup :: Markdown",
    "Topic :: Printing",
]
dependencies = [
    "weasyprint>=52.5",
    "markdown",
    "pymupdf",
]

[project.urls]
Homepage = "https://github.com/TbusOS/md-to-pdf"
Repository = "https://github.com/TbusOS/md-to-pdf"
Issues = "https://github.com/TbusOS/md-to-pdf/issues"

[project.scripts]
md2pdf = "md2pdf.cli:main"

[tool.setuptools.package-data]
md2pdf = ["default.css"]
